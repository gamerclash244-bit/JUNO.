<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juno Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{ --amber:#F5A623; --amber-soft:rgba(245,166,35,.1); --r:14px; --t:.25s ease; }
    [data-theme="dark"]{ --bg:#080808; --surface:#0F0F0F; --s2:#161616; --s3:#1E1E1E; --border:rgba(255,255,255,.07); --txt:#EEEEE; --muted:rgba(238,238,238,.45); --dim:rgba(238,238,238,.2); }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt,#eee);min-height:100vh}
    a{color:inherit;text-decoration:none}
    /* ── LOGIN ── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{background:var(--surface,#0F0F0F);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:var(--r);padding:48px 40px;width:100%;max-width:400px}
    .login-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:1.3rem;color:#eee;margin-bottom:8px}
    .login-logo span{color:var(--amber)}
    .login-sub{font-size:.85rem;color:var(--muted,rgba(238,238,238,.45));margin-bottom:32px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.77rem;font-weight:600;color:var(--muted,rgba(238,238,238,.45));margin-bottom:6px;letter-spacing:.04em}
    .field input{width:100%;background:var(--s2,#161616);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:10px;padding:11px 14px;font-family:'Outfit',sans-serif;font-size:.9rem;color:#eee;outline:none;transition:border-color .2s}
    .field input:focus{border-color:var(--amber)}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:50px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:all .25s}
    .btn-primary{background:var(--amber);color:#000;width:100%;justify-content:center}
    .btn-primary:hover{opacity:.9}
    .btn-sm{padding:7px 16px;font-size:.78rem;border-radius:30px}
    .btn-ghost{background:transparent;color:var(--muted,rgba(238,238,238,.45));border:1px solid var(--border,rgba(255,255,255,.07))}
    .btn-ghost:hover{color:#eee;border-color:rgba(255,255,255,.2)}
    .btn-danger{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
    .btn-danger:hover{background:rgba(239,68,68,.25)}
    .form-err{color:#ef4444;font-size:.8rem;margin-top:10px;min-height:20px}
    /* ── LAYOUT ── */
    .app{display:none;min-height:100vh}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--surface,#0F0F0F);border-right:1px solid var(--border,rgba(255,255,255,.07));padding:24px 0;display:flex;flex-direction:column;z-index:10}
    .sidebar-logo{font-family:'Space Mono',monospace;font-weight:700;font-size:1.05rem;color:#eee;padding:0 24px 24px;border-bottom:1px solid var(--border,rgba(255,255,255,.07))}
    .sidebar-logo span{color:var(--amber)}
    .sidebar-logo small{display:block;font-family:'Outfit',sans-serif;font-size:.72rem;color:var(--muted,rgba(238,238,238,.45));font-weight:400;margin-top:2px}
    .nav-menu{padding:16px 12px;flex:1}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:.87rem;font-weight:500;color:var(--muted,rgba(238,238,238,.45));transition:all .2s;margin-bottom:2px}
    .nav-item:hover{color:#eee;background:var(--s2,#161616)}
    .nav-item.active{color:#eee;background:var(--s2,#161616);border-left:2px solid var(--amber)}
    .nav-item .icon{font-size:16px;width:20px;text-align:center}
    .sidebar-foot{padding:16px 24px;border-top:1px solid var(--border,rgba(255,255,255,.07))}
    .main{margin-left:220px;padding:32px;min-height:100vh}
    /* ── HEADER ── */
    .page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .page-title{font-family:'Space Mono',monospace;font-weight:700;font-size:1.4rem;color:#eee}
    .page-sub{font-size:.83rem;color:var(--muted,rgba(238,238,238,.45));margin-top:3px}
    /* ── STATS ── */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
    .stat-card{background:var(--surface,#0F0F0F);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:var(--r);padding:20px 22px}
    .stat-val{font-family:'Space Mono',monospace;font-weight:700;font-size:1.7rem;color:var(--amber)}
    .stat-lbl{font-size:.74rem;color:var(--muted,rgba(238,238,238,.45));margin-top:4px}
    /* ── TABLE ── */
    .table-wrap{background:var(--surface,#0F0F0F);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:var(--r);overflow:hidden}
    .table-toolbar{padding:16px 20px;border-bottom:1px solid var(--border,rgba(255,255,255,.07));display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .tbl-search{background:var(--s2,#161616);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:8px;padding:8px 14px;font-family:'Outfit',sans-serif;font-size:.85rem;color:#eee;outline:none;min-width:220px}
    .tbl-search:focus{border-color:var(--amber)}
    .filter-btn{padding:7px 14px;border-radius:20px;font-size:.77rem;font-weight:600;cursor:pointer;border:1px solid var(--border,rgba(255,255,255,.07));background:var(--s2,#161616);color:var(--muted,rgba(238,238,238,.45));transition:all .2s}
    .filter-btn.active,.filter-btn:hover{border-color:var(--amber);color:var(--amber)}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    thead tr{border-bottom:1px solid var(--border,rgba(255,255,255,.07))}
    th{padding:12px 18px;text-align:left;font-size:.71rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim,rgba(238,238,238,.2))}
    td{padding:14px 18px;border-bottom:1px solid var(--border,rgba(255,255,255,.07));color:#ddd;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--s2,#161616)}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .s-pending{background:rgba(245,166,35,.12);color:#F5A623;border:1px solid rgba(245,166,35,.25)}
    .s-confirmed{background:rgba(99,102,241,.12);color:#818cf8;border:1px solid rgba(99,102,241,.25)}
    .s-shipped{background:rgba(14,165,233,.12);color:#38bdf8;border:1px solid rgba(14,165,233,.25)}
    .s-delivered{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
    .s-cancelled{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
    .actions{display:flex;gap:6px}
    .empty{padding:48px;text-align:center;color:var(--muted,rgba(238,238,238,.45));font-size:.88rem}
    .loading{padding:48px;text-align:center;color:var(--muted,rgba(238,238,238,.45))}
    /* ── DRAWER ── */
    .drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
    .drawer-bg.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:460px;background:var(--surface,#0F0F0F);border-left:1px solid var(--border,rgba(255,255,255,.07));padding:32px;overflow-y:auto;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:301}
    .drawer-bg.open .drawer{transform:translateX(0)}
    .drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .drawer-title{font-family:'Space Mono',monospace;font-weight:700;font-size:1.1rem}
    .info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border,rgba(255,255,255,.07));font-size:.87rem}
    .info-row:last-child{border-bottom:none}
    .info-lbl{color:var(--muted,rgba(238,238,238,.45));flex-shrink:0;margin-right:12px}
    .info-val{color:#eee;text-align:right;word-break:break-all}
    .edit-select{background:var(--s2,#161616);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:8px;padding:8px 12px;font-family:'Outfit',sans-serif;font-size:.87rem;color:#eee;outline:none;width:100%;cursor:pointer}
    .edit-select:focus{border-color:var(--amber)}
    .edit-input{background:var(--s2,#161616);border:1px solid var(--border,rgba(255,255,255,.07));border-radius:8px;padding:8px 12px;font-family:'Outfit',sans-serif;font-size:.87rem;color:#eee;outline:none;width:100%;margin-top:8px}
    .edit-input:focus{border-color:var(--amber)}
    .section-sep{margin:20px 0 14px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim,rgba(238,238,238,.2))}
    /* ── NOTIFY TABLE ── */
    #notifyPage{display:none}
    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .main{margin-left:0;padding:20px}
      .drawer{width:100%}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">JUNO<span>.</span> <span style="font-size:.7em;color:rgba(238,238,238,.4)">Admin</span></div>
    <p class="login-sub">Sign in to manage orders and customers.</p>
    <div class="field"><label>Email</label><input id="l_email" type="email" placeholder="admin@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="field"><label>Password</label><input id="l_pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="form-err" id="loginErr"></div>
    <button class="btn btn-primary" style="margin-top:8px" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">JUNO<span>.</span><small>Admin Panel</small></div>
    <nav class="nav-menu">
      <div class="nav-item active" onclick="showPage('orders')" id="nav-orders"><span class="icon">📦</span>Orders</div>
      <div class="nav-item" onclick="showPage('notify')" id="nav-notify"><span class="icon">🔔</span>Waitlist</div>
    </nav>
    <div class="sidebar-foot">
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">

    <!-- ORDERS PAGE -->
    <div id="ordersPage">
      <div class="page-head">
        <div>
          <div class="page-title">Orders</div>
          <div class="page-sub" id="ordersSubtitle">Loading...</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadStats();loadOrders()">↻ Refresh</button>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total Orders</div></div>
        <div class="stat-card"><div class="stat-val" id="s-pending">—</div><div class="stat-lbl">Pending</div></div>
        <div class="stat-card"><div class="stat-val" id="s-confirmed">—</div><div class="stat-lbl">Confirmed</div></div>
        <div class="stat-card"><div class="stat-val" id="s-shipped">—</div><div class="stat-lbl">Shipped</div></div>
        <div class="stat-card"><div class="stat-val" id="s-delivered">—</div><div class="stat-lbl">Delivered</div></div>
        <div class="stat-card"><div class="stat-val" id="s-revenue">—</div><div class="stat-lbl">Revenue (₹)</div></div>
      </div>

      <div class="table-wrap">
        <div class="table-toolbar">
          <input class="tbl-search" id="orderSearch" placeholder="Search name or email..." oninput="filterOrders()"/>
          <button class="filter-btn active" onclick="setFilter('')" id="f-all">All</button>
          <button class="filter-btn" onclick="setFilter('pending')" id="f-pending">Pending</button>
          <button class="filter-btn" onclick="setFilter('confirmed')" id="f-confirmed">Confirmed</button>
          <button class="filter-btn" onclick="setFilter('shipped')" id="f-shipped">Shipped</button>
          <button class="filter-btn" onclick="setFilter('delivered')" id="f-delivered">Delivered</button>
        </div>
        <div id="ordersTable"><div class="loading">Loading orders...</div></div>
      </div>
    </div>

    <!-- NOTIFY PAGE -->
    <div id="notifyPage">
      <div class="page-head">
        <div>
          <div class="page-title">Juno.2 Waitlist</div>
          <div class="page-sub" id="notifySubtitle">—</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadNotify()">↻ Refresh</button>
      </div>
      <div class="table-wrap">
        <div id="notifyTable"><div class="loading">Loading...</div></div>
      </div>
    </div>

  </main>
</div>

<!-- ORDER DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <div class="drawer-title" id="drawerTitle">Order</div>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawerContent"></div>
  </div>
</div>

<script>
const API = 'https://your-juno-api.onrender.com'; // ← update this
let token = localStorage.getItem('junoAdminToken');
let allOrders = [];
let filterStatus = '';

// ─── AUTH ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('l_email').value.trim();
  const pass  = document.getElementById('l_pass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Email and password required'; return; }
  try {
    const res  = await fetch(`${API}/api/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password:pass}) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    token = data.token;
    localStorage.setItem('junoAdminToken', token);
    showApp();
  } catch(e) { err.textContent = e.message; }
}

function logout() {
  token = null;
  localStorage.removeItem('junoAdminToken');
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

function authHeaders() { return { 'Content-Type':'application/json', Authorization:`Bearer ${token}` }; }

function showApp() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  loadStats();
  loadOrders();
}

if (token) showApp();

// ─── NAVIGATION ────────────────────────────────────────────────────────────
function showPage(page) {
  document.getElementById('ordersPage').style.display = page === 'orders' ? 'block' : 'none';
  document.getElementById('notifyPage').style.display = page === 'notify' ? 'block' : 'none';
  document.getElementById('nav-orders').classList.toggle('active', page === 'orders');
  document.getElementById('nav-notify').classList.toggle('active', page === 'notify');
  if (page === 'notify') loadNotify();
}

// ─── STATS ─────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/api/orders/meta/stats`, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('s-total').textContent     = data.total;
    document.getElementById('s-pending').textContent   = data.pending;
    document.getElementById('s-confirmed').textContent = data.confirmed;
    document.getElementById('s-shipped').textContent   = data.shipped;
    document.getElementById('s-delivered').textContent = data.delivered;
    document.getElementById('s-revenue').textContent   = `₹${(data.revenue||0).toLocaleString('en-IN')}`;
  } catch(e) { console.error(e); }
}

// ─── ORDERS ────────────────────────────────────────────────────────────────
async function loadOrders() {
  document.getElementById('ordersTable').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const url  = `${API}/api/orders?limit=100${filterStatus ? '&status='+filterStatus : ''}`;
    const res  = await fetch(url, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    allOrders = data.orders;
    document.getElementById('ordersSubtitle').textContent = `${data.total} total orders`;
    renderOrders(allOrders);
  } catch(e) {
    document.getElementById('ordersTable').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function setFilter(status) {
  filterStatus = status;
  ['all','pending','confirmed','shipped','delivered'].forEach(s => {
    document.getElementById('f-'+s).classList.toggle('active', (s === 'all' && !status) || s === status);
  });
  loadOrders();
}

function filterOrders() {
  const q = document.getElementById('orderSearch').value.toLowerCase();
  const filtered = allOrders.filter(o =>
    o.customer?.name?.toLowerCase().includes(q) ||
    o.customer?.email?.toLowerCase().includes(q) ||
    o._id?.toLowerCase().includes(q)
  );
  renderOrders(filtered);
}

function renderOrders(orders) {
  if (!orders.length) { document.getElementById('ordersTable').innerHTML = '<div class="empty">No orders found</div>'; return; }
  const rows = orders.map(o => `
    <tr>
      <td><code style="font-size:.72rem;color:var(--amber)">#${o._id.slice(-6).toUpperCase()}</code></td>
      <td>${o.customer?.name || '—'}</td>
      <td style="color:var(--muted,rgba(238,238,238,.45))">${o.customer?.email || '—'}</td>
      <td>${o.productName || o.product}</td>
      <td style="font-family:'Space Mono',monospace">₹${(o.price||0).toLocaleString('en-IN')}</td>
      <td><span class="status-badge s-${o.status}">${o.status}</span></td>
      <td style="color:var(--muted,rgba(238,238,238,.45));font-size:.78rem">${new Date(o.createdAt).toLocaleDateString('en-IN')}</td>
      <td><div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openDrawer('${o._id}')">View</button>
        <button class="btn btn-danger btn-sm" onclick="deleteOrder('${o._id}')">Del</button>
      </div></td>
    </tr>
  `).join('');
  document.getElementById('ordersTable').innerHTML = `
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Product</th><th>Price</th><th>Status</th><th>Date</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function deleteOrder(id) {
  if (!confirm('Delete this order? This cannot be undone.')) return;
  await fetch(`${API}/api/orders/${id}`, { method:'DELETE', headers:authHeaders() });
  loadOrders(); loadStats();
}

// ─── DRAWER ────────────────────────────────────────────────────────────────
async function openDrawer(id) {
  document.getElementById('drawerBg').classList.add('open');
  document.getElementById('drawerContent').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res = await fetch(`${API}/api/orders/${id}`, { headers: authHeaders() });
    const o   = await res.json();
    document.getElementById('drawerTitle').textContent = `Order #${o._id.slice(-6).toUpperCase()}`;
    document.getElementById('drawerContent').innerHTML = `
      <div class="section-sep">Customer</div>
      ${infoRow('Name', o.customer?.name)}
      ${infoRow('Email', o.customer?.email)}
      ${infoRow('Phone', o.customer?.phone || '—')}
      ${infoRow('Address', [o.customer?.address, o.customer?.city, o.customer?.state, o.customer?.pincode].filter(Boolean).join(', ') || '—')}
      <div class="section-sep">Order</div>
      ${infoRow('Product', o.productName)}
      ${infoRow('Price', `₹${(o.price||0).toLocaleString('en-IN')}`)}
      ${infoRow('Placed', new Date(o.createdAt).toLocaleString('en-IN'))}
      ${o.notes ? infoRow('Notes', o.notes) : ''}

      <div class="section-sep">Update Status</div>
      <select class="edit-select" id="d_status" onchange="updateOrder('${o._id}')">
        ${['pending','confirmed','shipped','delivered','cancelled'].map(s => `<option value="${s}" ${o.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>

      <div class="section-sep">Tracking Number</div>
      <input class="edit-input" id="d_tracking" placeholder="e.g. DTDC1234567" value="${o.trackingNumber||''}" onblur="updateOrder('${o._id}')"/>

      <div style="margin-top:20px;display:flex;gap:10px">
        <button class="btn btn-primary btn-sm" onclick="updateOrder('${o._id}',true)">Save Changes</button>
        <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">Close</button>
      </div>
      <div id="drawerMsg" style="margin-top:10px;font-size:.8rem;color:#4ade80;min-height:18px"></div>
    `;
  } catch(e) {
    document.getElementById('drawerContent').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function infoRow(lbl, val) {
  return `<div class="info-row"><span class="info-lbl">${lbl}</span><span class="info-val">${val||'—'}</span></div>`;
}

async function updateOrder(id, showMsg) {
  const status   = document.getElementById('d_status')?.value;
  const tracking = document.getElementById('d_tracking')?.value.trim();
  try {
    const res = await fetch(`${API}/api/orders/${id}`, {
      method:'PATCH', headers: authHeaders(),
      body: JSON.stringify({ status, trackingNumber: tracking }),
    });
    if (!res.ok) throw new Error('Update failed');
    if (showMsg) {
      document.getElementById('drawerMsg').textContent = '✓ Saved';
      setTimeout(() => { if(document.getElementById('drawerMsg')) document.getElementById('drawerMsg').textContent=''; }, 2000);
    }
    loadOrders(); loadStats();
  } catch(e) { if(document.getElementById('drawerMsg')) document.getElementById('drawerMsg').textContent = e.message; }
}

function closeDrawer() { document.getElementById('drawerBg').classList.remove('open'); }

// ─── NOTIFY / WAITLIST ─────────────────────────────────────────────────────
async function loadNotify() {
  document.getElementById('notifyTable').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const res  = await fetch(`${API}/api/notify`, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    document.getElementById('notifySubtitle').textContent = `${data.total} signups`;
    if (!data.list.length) { document.getElementById('notifyTable').innerHTML = '<div class="empty">No signups yet</div>'; return; }
    const rows = data.list.map(n => `
      <tr>
        <td>${n.email}</td>
        <td style="color:var(--muted,rgba(238,238,238,.45));font-size:.8rem">${new Date(n.createdAt).toLocaleDateString('en-IN')}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteNotify('${n._id}')">Remove</button></td>
      </tr>
    `).join('');
    document.getElementById('notifyTable').innerHTML = `
      <table>
        <thead><tr><th>Email</th><th>Signed up</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    document.getElementById('notifyTable').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

async function deleteNotify(id) {
  if (!confirm('Remove from waitlist?')) return;
  await fetch(`${API}/api/notify/${id}`, { method:'DELETE', headers: authHeaders() });
  loadNotify();
}
</script>
